<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>City Carpool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #11203a;
      --muted: #54627a;
      --accent: #1263ff;
      --accent-strong: #0d4fcc;
      --line: #d8e0f0;
      --danger: #c52135;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      background:
        radial-gradient(circle at 10% 0%, #dbe8ff 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, #d5ffe8 0%, transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(20, 41, 84, 0.08);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 22px;
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .muted {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
    }

    .ok {
      color: #0c7a3d;
    }

    .error {
      color: var(--danger);
    }

    .warning {
      color: #d97706;
    }

    .hidden {
      display: none;
    }

    .role-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .profile-role-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }

    input:focus {
      border-color: var(--accent);
      outline: none;
      box-shadow: 0 0 0 3px rgba(18, 99, 255, 0.14);
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button:hover {
      background: var(--accent-strong);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.secondary {
      background: #e6eeff;
      color: #173264;
    }

    #tripsList {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .trip {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fcfdff;
    }

    .trip-route {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .trip-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }

    .trip-actions {
      margin-top: 10px;
    }

    .trip-note {
      font-size: 12px;
      color: var(--muted);
    }

    button.book-btn {
      padding: 7px 10px;
      font-size: 13px;
      background: #0c7a3d;
    }

    button.book-btn:hover {
      background: #096731;
    }

    #myBookingsList {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .booking {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #f9fff9;
    }

    #myTripsList {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .my-trip {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: #fffef8;
    }

    .booking-actions {
      margin-top: 10px;
    }

    button.cancel-btn {
      padding: 7px 10px;
      font-size: 13px;
      background: #c52135;
    }

    button.cancel-btn:hover {
      background: #a41c2d;
    }

    .debug {
      margin-top: 8px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 11px;
      font-family: monospace;
      color: #666;
      word-break: break-all;
    }

    @media (min-width: 700px) {
      .row {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🚗 City Carpool</h1>
    <p class="muted" id="status">Инициализация Mini App...</p>
    <p class="muted" id="apiInfo"></p>
    <p class="muted" id="netInfo"></p>
  </div>

  <div class="card" id="roleCard">
    <h2>Вход в режим</h2>
    <p class="muted">Выберите, как войти в этот раз:</p>
    <div class="role-actions">
      <button type="button" id="roleDriverBtn">Я водитель</button>
      <button type="button" class="secondary" id="rolePassengerBtn">Я пассажир</button>
    </div>
    <p class="profile-role-label" id="selectedRoleLabel"></p>
  </div>

  <div class="card hidden" id="profileCard">
    <h2>Профиль</h2>
    <p class="muted" id="profileHint">Заполните профиль для выбранной роли.</p>
    <form id="profileForm">
      <div class="row">
        <div>
          <label for="profileName">Имя</label>
          <input id="profileName" name="profileName" type="text" required />
        </div>
        <div>
          <label for="profilePhone">Телефон</label>
          <input id="profilePhone" name="profilePhone" type="text" placeholder="+7..." required />
        </div>
      </div>

      <div class="row hidden" id="driverOnlyFields">
        <div>
          <label for="profileCarMake">Марка машины</label>
          <input id="profileCarMake" name="profileCarMake" type="text" />
        </div>
        <div>
          <label for="profileCarNumber">Номер машины</label>
          <input id="profileCarNumber" name="profileCarNumber" type="text" />
        </div>
      </div>

      <div class="actions">
        <button type="submit" id="saveProfileBtn">Сохранить и продолжить</button>
      </div>
    </form>
    <p class="muted" id="profileMessage"></p>
  </div>

  <div class="card hidden" id="createTripCard">
    <h2>Создать маршрут</h2>
    <form id="tripForm">
      <div class="row">
        <div>
          <label for="fromLocation">Откуда</label>
          <input id="fromLocation" name="fromLocation" type="text" placeholder="Например: Алматы" required />
        </div>
        <div>
          <label for="toLocation">Куда</label>
          <input id="toLocation" name="toLocation" type="text" placeholder="Например: Астана" required />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="departureTime">Время отправления</label>
          <input id="departureTime" name="departureTime" type="datetime-local" required />
        </div>
        <div>
          <label for="seatsTotal">Мест</label>
          <input id="seatsTotal" name="seatsTotal" type="number" min="1" value="3" required />
        </div>
      </div>

      <div class="actions">
        <button type="submit" id="createTripBtn">Создать</button>
        <button type="button" class="secondary" id="refreshTripsBtn">Обновить список</button>
      </div>
    </form>
    <p class="muted" id="formMessage"></p>
  </div>

  <div class="card hidden" id="tripsCard">
    <h2>Маршруты</h2>
    <div id="tripsList">
      <p class="muted">Загрузка...</p>
    </div>
    <div id="debugInfo" class="debug" style="display:none;"></div>
  </div>

  <div class="card hidden" id="myBookingsCard">
    <h2>Мои бронирования</h2>
    <div class="actions">
      <button type="button" class="secondary" id="refreshBookingsBtn">Обновить бронирования</button>
    </div>
    <div id="myBookingsList">
      <p class="muted">Загрузка...</p>
    </div>
  </div>

  <div class="card hidden" id="myTripsCard">
    <h2>Мои маршруты</h2>
    <div class="actions">
      <button type="button" class="secondary" id="refreshMyTripsBtn">Обновить мои маршруты</button>
    </div>
    <div id="myTripsList">
      <p class="muted">Загрузка...</p>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const APP_VERSION = "2026-02-24.8-role";
    const APP_URL = new URL(window.location.href);
    if (!APP_URL.searchParams.has("cb")) {
      APP_URL.searchParams.set("cb", String(Date.now()));
      window.location.replace(APP_URL.toString());
    }

    const API_STORAGE_KEY = "citycarpool_api_base";
    const searchParams = new URLSearchParams(window.location.search);
    const apiFromQuery = searchParams.get("api");
    if (apiFromQuery) {
      localStorage.setItem(API_STORAGE_KEY, apiFromQuery);
    }
    const apiFromStorage = localStorage.getItem(API_STORAGE_KEY);
    const API_BASE = apiFromQuery || apiFromStorage || "https://charlette-nonvocational-hilma.ngrok-free.dev";

    const statusEl = document.getElementById("status");
    const apiInfoEl = document.getElementById("apiInfo");
    const netInfoEl = document.getElementById("netInfo");
    const formMessageEl = document.getElementById("formMessage");
    const profileMessageEl = document.getElementById("profileMessage");
    const tripsListEl = document.getElementById("tripsList");
    const debugInfoEl = document.getElementById("debugInfo");
    const tripFormEl = document.getElementById("tripForm");
    const profileFormEl = document.getElementById("profileForm");
    const createTripBtn = document.getElementById("createTripBtn");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const refreshTripsBtn = document.getElementById("refreshTripsBtn");
    const refreshBookingsBtn = document.getElementById("refreshBookingsBtn");
    const myBookingsListEl = document.getElementById("myBookingsList");
    const refreshMyTripsBtn = document.getElementById("refreshMyTripsBtn");
    const myTripsListEl = document.getElementById("myTripsList");
    const roleCardEl = document.getElementById("roleCard");
    const profileCardEl = document.getElementById("profileCard");
    const createTripCardEl = document.getElementById("createTripCard");
    const tripsCardEl = document.getElementById("tripsCard");
    const myBookingsCardEl = document.getElementById("myBookingsCard");
    const myTripsCardEl = document.getElementById("myTripsCard");
    const roleDriverBtn = document.getElementById("roleDriverBtn");
    const rolePassengerBtn = document.getElementById("rolePassengerBtn");
    const selectedRoleLabelEl = document.getElementById("selectedRoleLabel");
    const profileHintEl = document.getElementById("profileHint");
    const profileNameEl = document.getElementById("profileName");
    const profilePhoneEl = document.getElementById("profilePhone");
    const profileCarMakeEl = document.getElementById("profileCarMake");
    const profileCarNumberEl = document.getElementById("profileCarNumber");
    const driverOnlyFieldsEl = document.getElementById("driverOnlyFields");

    apiInfoEl.textContent = `API: ${API_BASE}`;
    netInfoEl.textContent = `Version: ${APP_VERSION}`;

    let currentUser = null;
    let tripsState = [];
    let myBookingsState = [];
    let myTripsState = [];
    let selectedRole = null;
    let profileReady = false;
    let profilesState = { driver: null, passenger: null };

    function showDebug(message) {
      console.log(message);
      debugInfoEl.style.display = 'block';
      debugInfoEl.textContent += message + '\n';
    }

    async function apiRequest(path, options = {}) {
      const url = `${API_BASE}${path}`;
      showDebug(`🔄 ${options.method || 'GET'} ${url}`);

      const requestOptions = {
        cache: "no-store",
        ...options,
        headers: {
          // ВАЖНО для ngrok: пропускаем warning страницу
          'ngrok-skip-browser-warning': 'true',
          ...options.headers,
        },
      };

      try {
        const response = await fetch(url, requestOptions);
        showDebug(`📡 Response status: ${response.status}`);

        let payload = null;
        const contentType = response.headers.get('content-type');
        showDebug(`📄 Content-Type: ${contentType}`);

        if (contentType && contentType.includes('application/json')) {
          payload = await response.json();
          showDebug(`📦 Response: ${JSON.stringify(payload).substring(0, 200)}`);
        } else {
          const text = await response.text();
          showDebug(`📄 Response text: ${text.substring(0, 200)}`);
          payload = null;
        }

        if (!response.ok) {
          const message = payload?.error || payload?.message || `HTTP ${response.status}`;
          throw new Error(message);
        }

        return payload;
      } catch (error) {
        showDebug(`❌ Error: ${error.message}`);
        throw error;
      }
    }

    function setFormEnabled(enabled) {
      tripFormEl.querySelectorAll("input, button").forEach((el) => {
        el.disabled = !enabled;
      });
    }

    function setProfileFormEnabled(enabled) {
      profileFormEl.querySelectorAll("input, button").forEach((el) => {
        el.disabled = !enabled;
      });
    }

    function applyRoleVisibility() {
      if (!selectedRole || !profileReady) {
        createTripCardEl.classList.add("hidden");
        tripsCardEl.classList.add("hidden");
        myBookingsCardEl.classList.add("hidden");
        myTripsCardEl.classList.add("hidden");
        return;
      }

      tripsCardEl.classList.remove("hidden");
      if (selectedRole === "driver") {
        createTripCardEl.classList.remove("hidden");
        myTripsCardEl.classList.remove("hidden");
        myBookingsCardEl.classList.add("hidden");
      } else {
        createTripCardEl.classList.add("hidden");
        myTripsCardEl.classList.add("hidden");
        myBookingsCardEl.classList.remove("hidden");
      }
    }

    function fillProfileFormFromState(role) {
      const profile = role === "driver" ? profilesState.driver : profilesState.passenger;

      profileNameEl.value = profile?.full_name || "";
      profilePhoneEl.value = profile?.phone || "";
      if (role === "driver") {
        profileCarMakeEl.value = profile?.car_make || "";
        profileCarNumberEl.value = profile?.car_number || "";
      } else {
        profileCarMakeEl.value = "";
        profileCarNumberEl.value = "";
      }
    }

    function applyRoleSelection(role) {
      selectedRole = role;
      const isDriver = role === "driver";
      roleDriverBtn.classList.toggle("secondary", !isDriver);
      rolePassengerBtn.classList.toggle("secondary", isDriver);

      selectedRoleLabelEl.textContent = isDriver
        ? "Выбран режим: водитель"
        : "Выбран режим: пассажир";
      profileHintEl.textContent = isDriver
        ? "Для водителя: имя, телефон, марка и номер машины."
        : "Для пассажира: имя и телефон.";

      driverOnlyFieldsEl.classList.toggle("hidden", !isDriver);
      profileCarMakeEl.required = isDriver;
      profileCarNumberEl.required = isDriver;
      fillProfileFormFromState(role);

      profileCardEl.classList.remove("hidden");

      const hasProfile = isDriver ? Boolean(profilesState.driver) : Boolean(profilesState.passenger);
      if (hasProfile) {
        profileMessageEl.textContent = "Профиль найден. Можете продолжить или отредактировать.";
        profileMessageEl.className = "ok";
        profileReady = true;
      } else {
        profileMessageEl.textContent = "Заполните профиль для продолжения.";
        profileMessageEl.className = "warning";
        profileReady = false;
      }
      applyRoleVisibility();
    }

    function formatDateTime(isoDate) {
      const date = new Date(isoDate);
      if (Number.isNaN(date.getTime())) return isoDate;
      return date.toLocaleString("ru-RU", { hour12: false });
    }

    function renderTrips(trips) {
      showDebug(`🎨 Rendering ${trips.length} trips`);
      tripsListEl.innerHTML = "";
      
      if (!trips || !trips.length) {
        tripsListEl.innerHTML = `<p class="warning">Пока нет маршрутов. Создайте первый!</p>`;
        return;
      }

      trips.forEach((trip, index) => {
        showDebug(`  ${index + 1}. ${trip.from_location} -> ${trip.to_location}`);
        const isOwnTrip = currentUser && Number(currentUser.id) === Number(trip.driver_id);
        const canBook = selectedRole === "passenger" && Boolean(currentUser) && !isOwnTrip && trip.seats_available > 0;
        const tripActionHTML = canBook
          ? `<button type="button" class="book-btn" data-trip-id="${trip.id}">Забронировать место</button>`
          : `<span class="trip-note">${isOwnTrip ? "Ваш маршрут" : (trip.seats_available > 0 ? "Режим пассажира для бронирования" : "Мест нет")}</span>`;

        const card = document.createElement("div");
        card.className = "trip";
        card.innerHTML = `
          <div class="trip-route">${trip.from_location} → ${trip.to_location}</div>
          <div class="trip-meta">
            Водитель ID: ${trip.driver_id}<br />
            Отправление: ${formatDateTime(trip.departure_time)}<br />
            Места: ${trip.seats_available}/${trip.seats_total}
          </div>
          <div class="trip-actions">${tripActionHTML}</div>
        `;
        tripsListEl.appendChild(card);
      });
    }

    async function loadTrips() {
      showDebug('📋 Loading trips...');
      try {
        const trips = await apiRequest(`/trips?_=${Date.now()}`, {
          method: "GET",
          headers: { 
            Accept: "application/json",
          },
        });

        showDebug(`✅ Got response, type: ${typeof trips}, is array: ${Array.isArray(trips)}`);
        
        if (Array.isArray(trips)) {
          tripsState = trips;
          renderTrips(tripsState);
          netInfoEl.textContent = `Version: ${APP_VERSION} | ✅ ${tripsState.length} маршрутов`;
        } else if (trips && Array.isArray(trips.trips)) {
          // Если вернулся объект с полем trips
          tripsState = trips.trips;
          renderTrips(tripsState);
          netInfoEl.textContent = `Version: ${APP_VERSION} | ✅ ${tripsState.length} маршрутов`;
        } else {
          showDebug(`⚠️ Unexpected response format`);
          tripsListEl.innerHTML = `<p class="error">Неожиданный формат ответа от сервера</p>`;
        }
      } catch (error) {
        showDebug(`❌ Load trips failed: ${error.message}`);
        tripsListEl.innerHTML = `<p class="error">Ошибка загрузки: ${error.message}</p>`;
        netInfoEl.textContent = `Version: ${APP_VERSION} | ❌ ${error.message}`;
      }
    }

    async function loadProfiles() {
      if (!currentUser) return;
      try {
        const data = await apiRequest(`/profiles?telegram_id=${Number(currentUser.id)}`);
        profilesState = {
          driver: data?.driver || null,
          passenger: data?.passenger || null,
        };
      } catch (error) {
        showDebug(`❌ Load profiles failed: ${error.message}`);
        profilesState = { driver: null, passenger: null };
      }
    }

    function renderMyBookings(bookings) {
      myBookingsListEl.innerHTML = "";
      if (!bookings || !bookings.length) {
        myBookingsListEl.innerHTML = `<p class="warning">У вас пока нет бронирований.</p>`;
        return;
      }

      bookings.forEach((booking) => {
        const card = document.createElement("div");
        card.className = "booking";
        card.innerHTML = `
          <div class="trip-route">${booking.from_location} → ${booking.to_location}</div>
          <div class="trip-meta">
            Trip ID: ${booking.trip_id}<br />
            Водитель ID: ${booking.driver_id}<br />
            Отправление: ${formatDateTime(booking.departure_time)}<br />
            Забронировано: ${formatDateTime(booking.booked_at)}<br />
            Места сейчас: ${booking.seats_available}/${booking.seats_total}
          </div>
          <div class="booking-actions">
            <button type="button" class="cancel-btn" data-trip-id="${booking.trip_id}">Отменить бронирование</button>
          </div>
        `;
        myBookingsListEl.appendChild(card);
      });
    }

    async function loadMyBookings() {
      if (!currentUser || selectedRole !== "passenger") {
        myBookingsListEl.innerHTML = `<p class="muted">Требуется авторизация.</p>`;
        return;
      }

      try {
        const bookings = await apiRequest(`/my/bookings?passenger_id=${Number(currentUser.id)}&_=${Date.now()}`, {
          method: "GET",
          headers: {
            Accept: "application/json",
          },
        });

        myBookingsState = Array.isArray(bookings) ? bookings : [];
        renderMyBookings(myBookingsState);
      } catch (error) {
        myBookingsListEl.innerHTML = `<p class="error">Ошибка загрузки бронирований: ${error.message}</p>`;
      }
    }

    function renderMyTrips(trips) {
      myTripsListEl.innerHTML = "";
      if (!trips || !trips.length) {
        myTripsListEl.innerHTML = `<p class="warning">Вы еще не создали ни одного маршрута.</p>`;
        return;
      }

      trips.forEach((trip) => {
        const card = document.createElement("div");
        card.className = "my-trip";
        card.innerHTML = `
          <div class="trip-route">${trip.from_location} → ${trip.to_location}</div>
          <div class="trip-meta">
            Trip ID: ${trip.id}<br />
            Отправление: ${formatDateTime(trip.departure_time)}<br />
            Бронирований: ${trip.bookings_count}<br />
            Места: ${trip.seats_available}/${trip.seats_total}
          </div>
        `;
        myTripsListEl.appendChild(card);
      });
    }

    async function loadMyTrips() {
      if (!currentUser || selectedRole !== "driver") {
        myTripsListEl.innerHTML = `<p class="muted">Требуется авторизация.</p>`;
        return;
      }

      try {
        const trips = await apiRequest(`/my/trips?driver_id=${Number(currentUser.id)}&_=${Date.now()}`, {
          method: "GET",
          headers: {
            Accept: "application/json",
          },
        });

        myTripsState = Array.isArray(trips) ? trips : [];
        renderMyTrips(myTripsState);
      } catch (error) {
        myTripsListEl.innerHTML = `<p class="error">Ошибка загрузки ваших маршрутов: ${error.message}</p>`;
      }
    }

    async function authenticate() {
      if (!tg.initData) {
        statusEl.textContent = "⚠️ Открой Mini App из Telegram для авторизации";
        statusEl.className = "warning";
        setFormEnabled(false);
        return;
      }

      showDebug('🔐 Authenticating...');
      try {
        const authData = await apiRequest("/auth/telegram", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ initData: tg.initData }),
        });

        currentUser = authData?.user || tg.initDataUnsafe?.user || null;
        if (!currentUser) {
          throw new Error("Пользователь не найден в initData");
        }

        statusEl.textContent = `✅ ${currentUser.first_name} (ID: ${currentUser.id})`;
        statusEl.className = "ok";
        setFormEnabled(true);
        showDebug(`✅ Authenticated as ${currentUser.first_name}`);
      } catch (error) {
        statusEl.textContent = `❌ Ошибка авторизации: ${error.message}`;
        statusEl.className = "error";
        setFormEnabled(false);
        showDebug(`❌ Auth failed: ${error.message}`);
      }
    }

    roleDriverBtn.addEventListener("click", () => {
      applyRoleSelection("driver");
      loadTrips();
      loadMyTrips();
    });

    rolePassengerBtn.addEventListener("click", () => {
      applyRoleSelection("passenger");
      loadTrips();
      loadMyBookings();
    });

    profileFormEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentUser || !selectedRole) return;

      setProfileFormEnabled(false);
      profileMessageEl.textContent = "Сохранение профиля...";
      profileMessageEl.className = "muted";

      const payloadBase = {
        telegram_id: Number(currentUser.id),
        full_name: profileNameEl.value.trim(),
        phone: profilePhoneEl.value.trim(),
      };

      try {
        if (!payloadBase.full_name || !payloadBase.phone) {
          throw new Error("Имя и телефон обязательны");
        }

        if (selectedRole === "driver") {
          const driverPayload = {
            ...payloadBase,
            car_make: profileCarMakeEl.value.trim(),
            car_number: profileCarNumberEl.value.trim(),
          };
          if (!driverPayload.car_make || !driverPayload.car_number) {
            throw new Error("Марка и номер машины обязательны");
          }
          const saved = await apiRequest("/profiles/driver", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(driverPayload),
          });
          profilesState.driver = saved || null;
        } else {
          const saved = await apiRequest("/profiles/passenger", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payloadBase),
          });
          profilesState.passenger = saved || null;
        }

        profileReady = true;
        profileMessageEl.textContent = "Профиль сохранен.";
        profileMessageEl.className = "ok";
        applyRoleVisibility();
        await loadTrips();
        if (selectedRole === "driver") {
          await loadMyTrips();
        } else {
          await loadMyBookings();
        }
      } catch (error) {
        profileReady = false;
        applyRoleVisibility();
        profileMessageEl.textContent = `Ошибка профиля: ${error.message}`;
        profileMessageEl.className = "error";
      } finally {
        setProfileFormEnabled(true);
      }
    });

    tripFormEl.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentUser || selectedRole !== "driver" || !profileReady) return;

      formMessageEl.textContent = "Создание маршрута...";
      formMessageEl.className = "muted";
      createTripBtn.disabled = true;

      const departureInput = document.getElementById("departureTime").value;
      const departureDate = new Date(departureInput);
      if (Number.isNaN(departureDate.getTime())) {
        formMessageEl.textContent = "Некорректная дата отправления.";
        formMessageEl.className = "error";
        createTripBtn.disabled = false;
        return;
      }
      const departureISO = departureDate.toISOString();

      const payload = {
        driver_id: Number(currentUser.id),
        from_location: document.getElementById("fromLocation").value.trim(),
        to_location: document.getElementById("toLocation").value.trim(),
        departure_time: departureISO,
        seats_total: Number(document.getElementById("seatsTotal").value),
      };

      showDebug(`🚀 Creating trip: ${JSON.stringify(payload)}`);

      try {
        const createdTrip = await apiRequest("/trips", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        formMessageEl.textContent = "✅ Маршрут создан!";
        formMessageEl.className = "ok";

        showDebug(`✅ Trip created: ID ${createdTrip?.id}`);

        tripFormEl.reset();
        document.getElementById("seatsTotal").value = "3";
        
        // Обновляем список
        await loadMyTrips();
        await loadTrips();
      } catch (error) {
        formMessageEl.textContent = `❌ ${error.message}`;
        formMessageEl.className = "error";
      } finally {
        createTripBtn.disabled = false;
      }
    });

    refreshTripsBtn.addEventListener("click", async () => {
      debugInfoEl.textContent = '';
      debugInfoEl.style.display = 'none';
      await loadTrips();
    });

    refreshBookingsBtn.addEventListener("click", async () => {
      await loadMyBookings();
    });

    refreshMyTripsBtn.addEventListener("click", async () => {
      await loadMyTrips();
    });

    tripsListEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".book-btn");
      if (!button) return;
      if (!currentUser || selectedRole !== "passenger" || !profileReady) {
        formMessageEl.textContent = "❌ Для бронирования войдите как пассажир";
        formMessageEl.className = "error";
        return;
      }

      const tripId = Number(button.dataset.tripId);
      if (!tripId) return;

      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "Бронирование...";

      try {
        const result = await apiRequest(`/trips/${tripId}/book`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ passenger_id: Number(currentUser.id) }),
        });

        formMessageEl.textContent = "✅ Место забронировано!";
        formMessageEl.className = "ok";
        showDebug(`✅ Trip booked: ID ${tripId}`);

        if (result?.trip?.id) {
          tripsState = tripsState.map((trip) => (trip.id === result.trip.id ? result.trip : trip));
          renderTrips(tripsState);
        }
        await loadMyBookings();
        await loadMyTrips();
        await loadTrips();
      } catch (error) {
        formMessageEl.textContent = `❌ ${error.message}`;
        formMessageEl.className = "error";
        showDebug(`❌ Booking failed: ${error.message}`);
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    });

    myBookingsListEl.addEventListener("click", async (event) => {
      const button = event.target.closest(".cancel-btn");
      if (!button) return;
      if (!currentUser || selectedRole !== "passenger" || !profileReady) {
        formMessageEl.textContent = "❌ Для отмены брони войдите как пассажир";
        formMessageEl.className = "error";
        return;
      }

      const tripId = Number(button.dataset.tripId);
      if (!tripId) return;

      const originalText = button.textContent;
      button.disabled = true;
      button.textContent = "Отмена...";

      try {
        await apiRequest(`/trips/${tripId}/book?passenger_id=${Number(currentUser.id)}`, {
          method: "DELETE",
        });
        formMessageEl.textContent = "✅ Бронирование отменено";
        formMessageEl.className = "ok";
        await loadMyBookings();
        await loadMyTrips();
        await loadTrips();
      } catch (error) {
        formMessageEl.textContent = `❌ ${error.message}`;
        formMessageEl.className = "error";
      } finally {
        button.disabled = false;
        button.textContent = originalText;
      }
    });

    // Запуск при загрузке
    (async () => {
      setFormEnabled(false);
      setProfileFormEnabled(true);
      applyRoleVisibility();
      await authenticate();
      if (!currentUser) {
        return;
      }
      await loadProfiles();
      profileCardEl.classList.remove("hidden");
      profileMessageEl.textContent = "Выберите роль для входа: водитель или пассажир.";
      profileMessageEl.className = "muted";
      selectedRoleLabelEl.textContent = "";
    })();
  </script>

</body>
</html>
